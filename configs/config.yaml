# Hydra config-driven training. Run via: uv run python -m deeplob.training.train
#
# hydra.job.chdir=false keeps the working directory unchanged (Hydra's older default
# auto-chdir's into a per-run outputs/<date>/<time>/ directory, which would scatter a
# relative mlflow.tracking_uri across many directories instead of accumulating in one
# `mlruns/` at the repo root -- the well-known gotcha this setting exists to avoid).
hydra:
  job:
    chdir: false

# A proper Hydra config group (configs/model/*.yaml), not a flat inline block -- lets the
# model be swapped via `model=cnn_lstm` / `model=transformer` on the command line (needed
# starting M5, which adds the Transformer as a second choice) or swept across via
# `--multirun model=cnn_lstm,transformer`, without touching this file.
defaults:
  - model: cnn_lstm
  - _self_

seed: 42

data:
  num_synthetic_snapshots: 20000
  window_size: 100
  horizon: 10
  alpha: 0.0005
  train_frac: 0.7
  val_frac: 0.15

training:
  learning_rate: 0.001
  batch_size: 64
  max_epochs: 5

# A database backend (not the plain filesystem "./mlruns" store): current MLflow (3.x) has
# put the filesystem tracking backend into maintenance mode and raises rather than silently
# using it -- confirmed by actually running this script, not assumed from documentation.
# SQLite is the simplest database backend for a local, single-user research project like this
# one; a real deployment would use a proper server, which this project doesn't need.
mlflow:
  tracking_uri: sqlite:///mlflow.db
  # Grouped by the actual model choice (via Hydra's runtime.choices resolver), not a fixed
  # name -- now that `model` is swappable (M5), a fixed "deeplob-cnn-lstm" name would quietly
  # mix Transformer runs into the CNN-LSTM's own experiment.
  experiment_name: deeplob-${hydra:runtime.choices.model}
